name: Build and Release Android App

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: 'Release Note'
        required: false
        default: 'Manual Build'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore and Setup Properties
        run: |
          echo "MY_KEYSTORE_FILE=upload_keystore.jks" > keystore.properties
          echo "MY_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "MY_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "MY_KEYSTORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> keystore.properties

          mkdir -p easycontrolfork/app
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > easycontrolfork/app/upload_keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x easycontrolfork/gradlew

      - name: Build Server
        run: |
          cd easycontrolfork
          ./gradlew :server:copyRelease --no-daemon

      - name: Build App
        run: |
          cd easycontrolfork
          ./gradlew :app:assembleRelease --no-daemon

      - name: Show APK
        run: |
          ls -R easycontrolfork/app/build/outputs/

      - name: Generate Tag
        id: tag
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          echo "release_date=$(date +"%Y-%m-%d %H:%M")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: EasyControl Release ${{ steps.tag.outputs.release_tag }}
          body: |
            Build Date: ${{ steps.tag.outputs.release_date }}
            Note: ${{ github.event.inputs.release_note }}
          draft: false
          prerelease: false
          files: |
            easycontrolfork/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
